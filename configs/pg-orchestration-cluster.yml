---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
    name: pg-camunda
spec:
    instances: 1
    description: PostgreSQL cluster for Camunda orchestration secondary storage (RDBMS mode)
    # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql versioning=docker
    imageName: ghcr.io/cloudnative-pg/postgresql:17.9
    storage:
        size: 15Gi
    superuserSecret:
        name: pg-camunda-superuser-secret
    bootstrap:
        initdb:
            database: camunda
            owner: camunda
            dataChecksums: true
            secret:
                name: pg-camunda-secret
